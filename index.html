<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubLens — 訂閱追蹤器</title>

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32"   href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16"   href="icons/favicon-16.png">
  <link rel="apple-touch-icon"      sizes="180x180" href="icons/icon-180.png">

  <!-- PWA / Android home screen -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4F46E5">

  <style>
    *, *::before, *::after {
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.15s ease;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .modal-enter  { animation: fadeIn 0.2s ease forwards; }
    .modal-box-enter { animation: slideUp 0.2s ease forwards; }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">

  <!-- ============================================================ -->
  <!-- Full-page Loading Overlay (first load only)                  -->
  <!-- ============================================================ -->
  <div id="loadingOverlay" class="fixed inset-0 bg-white dark:bg-gray-900 z-50 flex flex-col items-center justify-center">
    <div class="animate-spin rounded-full h-16 w-16 border-4 border-indigo-500 border-t-transparent mb-4"></div>
    <p class="text-gray-400 dark:text-gray-500 text-sm">載入中…</p>
  </div>

  <!-- ============================================================ -->
  <!-- Toast Container                                              -->
  <!-- ============================================================ -->
  <div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <!-- ============================================================ -->
  <!-- Sticky Header                                                -->
  <!-- ============================================================ -->
  <header class="sticky top-0 z-40 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="text-xl font-bold text-indigo-600 tracking-tight">💰 SubLens</h1>
      <div class="flex items-center gap-2">
        <button id="darkModeToggle"
          class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition"
          title="切換夜間模式"
          aria-label="Toggle dark mode">
          <span id="darkModeIcon">🌙</span>
        </button>
        <button id="btnAdd"
          class="bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors shadow-sm">
          + 新增
        </button>
      </div>
    </div>
  </header>

  <!-- ============================================================ -->
  <!-- Live Rates Bar                                               -->
  <!-- ============================================================ -->
  <div id="ratesBar"
    class="max-w-5xl mx-auto mx-4 mt-4 px-4 py-2 rounded-xl bg-white dark:bg-gray-800
           border border-gray-100 dark:border-gray-700
           flex items-center justify-between text-sm flex-wrap gap-2">

    <div class="flex items-center gap-4 flex-wrap">
      <span class="text-gray-500 dark:text-gray-400 font-medium">💱 實時匯率</span>

      <span class="text-gray-700 dark:text-gray-300">
        USD <span id="rateUSD" class="font-semibold text-indigo-600 dark:text-indigo-400">--</span>
      </span>
      <span class="text-gray-700 dark:text-gray-300">
        CNY <span id="rateCNY" class="font-semibold text-indigo-600 dark:text-indigo-400">--</span>
      </span>
      <span class="text-gray-700 dark:text-gray-300">
        EUR <span id="rateEUR" class="font-semibold text-indigo-600 dark:text-indigo-400">--</span>
      </span>
    </div>

    <div class="flex items-center gap-2 text-gray-400 dark:text-gray-500 text-xs">
      <span>更新於 <span id="ratesUpdatedAt">--</span></span>
      <button id="refreshRatesBtn"
        class="text-indigo-500 hover:text-indigo-700 dark:text-indigo-400
               hover:underline transition"
        title="重新獲取匯率">
        ↻ 刷新
      </button>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- Main Content                                                 -->
  <!-- ============================================================ -->
  <main class="max-w-5xl mx-auto px-4 py-6 space-y-6">

    <!-- Summary Cards -->
    <section class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-5">
        <p class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wide mb-2">每月支出</p>
        <p id="summaryMonthly" class="text-2xl font-bold text-indigo-600">HK$0.00</p>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-5">
        <p class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wide mb-2">每年支出</p>
        <p id="summaryYearly" class="text-2xl font-bold text-indigo-600">HK$0.00</p>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-5">
        <p class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wide mb-2">累積支出</p>
        <p id="summaryCumulative" class="text-2xl font-bold text-indigo-600">HK$0.00</p>
      </div>
    </section>

    <!-- Charts -->
    <section class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-5">
        <h2 class="text-sm font-semibold text-gray-600 dark:text-gray-300 mb-4">分類支出（月均）</h2>
        <div class="relative h-64">
          <canvas id="pieChart"></canvas>
          <div id="pieEmpty" class="hidden absolute inset-0 flex items-center justify-center text-gray-300 dark:text-gray-500 text-sm">暫無資料</div>
        </div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-5">
        <h2 class="text-sm font-semibold text-gray-600 dark:text-gray-300 mb-4">過去 6 個月支出趨勢</h2>
        <div class="relative h-64">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
    </section>

    <!-- Filter Tabs + List -->
    <section>
      <div class="flex gap-2 mb-4">
        <button class="tab-btn px-4 py-2 text-sm font-medium rounded-lg transition-colors" data-filter="all">全部</button>
        <button class="tab-btn px-4 py-2 text-sm font-medium rounded-lg transition-colors" data-filter="active">啟用中</button>
        <button class="tab-btn px-4 py-2 text-sm font-medium rounded-lg transition-colors" data-filter="archived">封存</button>
      </div>

      <!-- Subscription Cards Grid -->
      <div id="subscriptionList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

      <!-- Empty State -->
      <div id="emptyState" class="hidden text-center py-20 text-gray-400 dark:text-gray-500">
        <div class="text-6xl mb-4">📭</div>
        <p class="text-lg font-semibold text-gray-500 dark:text-gray-400">尚無訂閱記錄</p>
        <p class="text-sm mt-1">點擊右上角「+ 新增」來新增第一個訂閱</p>
      </div>
    </section>
  </main>

  <!-- ============================================================ -->
  <!-- Add / Edit Modal                                             -->
  <!-- ============================================================ -->
  <div id="modalOverlay"
    class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
    <div id="modalBox" class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto">
      <div class="p-6">
        <div class="flex items-center justify-between mb-5">
          <h2 id="modalTitle" class="text-lg font-bold text-gray-800 dark:text-gray-100">新增訂閱</h2>
          <button id="btnCloseModal"
            class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-xl leading-none">
            &times;
          </button>
        </div>

        <form id="subscriptionForm" class="space-y-4" novalidate>
          <input type="hidden" id="fieldId" />

          <!-- 名稱 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
              名稱 <span class="text-red-500">*</span>
            </label>
            <input id="fieldName" type="text"
              class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent bg-white dark:bg-gray-700 dark:text-gray-100"
              placeholder="例：Netflix" />
          </div>

          <!-- 分類 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">分類</label>
            <select id="fieldCategory"
              class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent bg-white dark:bg-gray-700 dark:text-gray-100">
              <option value="娛樂">娛樂</option>
              <option value="工作效率">工作效率</option>
              <option value="雲端儲存">雲端儲存</option>
              <option value="AI工具">AI工具</option>
              <option value="其他">其他</option>
            </select>
          </div>

          <!-- Emoji -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Emoji 圖示</label>
            <input id="fieldEmoji" type="text"
              class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent bg-white dark:bg-gray-700 dark:text-gray-100"
              placeholder="📦" maxlength="4" />
          </div>

          <!-- 金額 + 貨幣 -->
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                金額 <span class="text-red-500">*</span>
              </label>
              <input id="fieldAmount" type="number" min="0.01" step="0.01"
                class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent bg-white dark:bg-gray-700 dark:text-gray-100"
                placeholder="0.00" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">貨幣</label>
              <select id="fieldCurrency"
                class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent bg-white dark:bg-gray-700 dark:text-gray-100">
                <option value="HKD">HKD</option>
                <option value="USD">USD</option>
                <option value="CNY">CNY</option>
              </select>
            </div>
          </div>

          <!-- 繳費週期 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">繳費週期</label>
            <select id="fieldBillingCycle"
              class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent bg-white dark:bg-gray-700 dark:text-gray-100">
              <option value="monthly">每月</option>
              <option value="yearly">每年</option>
            </select>
          </div>

          <!-- 開始日期 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
              開始日期 <span class="text-red-500">*</span>
            </label>
            <input id="fieldStartDate" type="date"
              class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent bg-white dark:bg-gray-700 dark:text-gray-100" />
          </div>

          <!-- 備註 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">備註（選填）</label>
            <textarea id="fieldNotes" rows="2"
              class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent resize-none bg-white dark:bg-gray-700 dark:text-gray-100"
              placeholder="其他備注..."></textarea>
          </div>

          <!-- 結束日期（僅封存時顯示）-->
          <div id="fieldEndDateWrapper">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">結束日期（選填）</label>
            <input id="fieldEndDate" type="date"
              class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent bg-white dark:bg-gray-700 dark:text-gray-100" />
          </div>

          <!-- Buttons -->
          <div class="flex gap-3 pt-1">
            <button type="button" id="btnCancelModal"
              class="flex-1 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 text-sm font-medium py-2.5 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
              取消
            </button>
            <button type="submit"
              class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold py-2.5 rounded-lg transition-colors">
              儲存
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- Remove Confirmation Modal                                    -->
  <!-- ============================================================ -->
  <div id="removeModalOverlay"
    class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-sm p-6">
      <div class="text-center mb-5">
        <div class="text-5xl mb-3">⚠️</div>
        <h2 class="text-lg font-bold text-gray-800 dark:text-gray-100">確認移除</h2>
        <p id="removeModalName" class="text-sm text-gray-500 dark:text-gray-400 mt-1"></p>
      </div>

      <div class="space-y-2 mb-5">
        <label id="labelDelete"
          class="flex items-start gap-3 cursor-pointer p-3 rounded-xl border border-transparent hover:border-gray-200 dark:hover:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
          <input type="radio" name="removeMode" value="delete" class="mt-0.5 accent-indigo-600" />
          <div>
            <p class="text-sm font-medium text-gray-800 dark:text-gray-100">完全刪除</p>
            <p class="text-xs text-gray-400">移除所有相關帳單記錄</p>
          </div>
        </label>
        <label id="labelArchive"
          class="flex items-start gap-3 cursor-pointer p-3 rounded-xl border border-indigo-200 bg-indigo-50 dark:border-indigo-500 dark:bg-indigo-900/30 transition-colors">
          <input type="radio" name="removeMode" value="archive" checked class="mt-0.5 accent-indigo-600" />
          <div>
            <p class="text-sm font-medium text-gray-800 dark:text-gray-100">封存並保留帳單記錄</p>
            <p class="text-xs text-indigo-400">預設選項</p>
          </div>
        </label>
      </div>

      <!-- End Date Field (only shown when archive mode is selected) -->
      <div id="endDateField" class="mb-5">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">結束日期（選填）</label>
        <input id="removeEndDate" type="date"
          class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent bg-white dark:bg-gray-700 dark:text-gray-100" />
      </div>

      <div class="flex gap-3">
        <button id="btnCancelRemove"
          class="flex-1 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 text-sm font-medium py-2.5 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
          取消
        </button>
        <button id="btnConfirmRemove"
          class="flex-1 bg-red-500 hover:bg-red-600 text-white text-sm font-semibold py-2.5 rounded-lg transition-colors">
          確認移除
        </button>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- Inline API Spinner (shown during each API call)             -->
  <!-- ============================================================ -->
  <div id="apiSpinner" class="hidden fixed bottom-5 right-5 z-50 bg-white dark:bg-gray-800 rounded-full shadow-lg p-2.5">
    <div class="animate-spin rounded-full h-5 w-5 border-2 border-indigo-500 border-t-transparent"></div>
  </div>

  <!-- ============================================================ -->
  <!-- Script                                                       -->
  <!-- ============================================================ -->
  <script>

    // ============================================================
    // Configuration — replace API_URL after deploying Apps Script
    // ============================================================
    const CONFIG = {
      API_URL: "https://script.google.com/macros/s/AKfycbx3Qcm7zEpFvIMFET95UrdohfF68UZ0riDM9ydATGjaf9QGE_wpEu5_uJbRvyNPzCnYPQ/exec",
      DEFAULT_CURRENCY: "HKD",
      RATES: {
        USDHKD: 7.78,  // fallback if API fails
        CNYHKD: 1.07,
        EURHKD: 8.45
      }
    };

    // ============================================================
    // App State
    // ============================================================
    const state = {
      subscriptions: [],
      bills: [],
      filter: 'all',
      editingId: null,
      removingId: null,
      pieChart: null
    };

    // ============================================================
    // Currency Helpers
    // ============================================================
    function convertToHKD(amount, currency) {
      if (currency === 'HKD') return amount;
      const rateKey = `${currency}HKD`;
      const rate = CONFIG.RATES[rateKey];
      if (!rate) {
        console.warn(`No rate found for ${currency}, using 1:1`);
        return amount;
      }
      return amount * rate;
    }

    function toHKD(amount, currency) {
      return convertToHKD(Number(amount) || 0, currency);
    }

    function fmtHKD(amount) {
      return 'HK$' + Number(amount).toFixed(2);
    }

    function formatAmount(amount, currency) {
      const num = parseFloat(amount) || 0;
      const original = `${currency} ${num.toFixed(2)}`;
      if (currency === 'HKD') return original;
      const rateKey = `${currency}HKD`;
      if (!CONFIG.RATES[rateKey]) return original;
      const hkd = convertToHKD(num, currency);
      return `${original} <span class="text-gray-400 dark:text-gray-500 text-sm font-normal">(≈ HK$${hkd.toFixed(2)})</span>`;
    }

    // ============================================================
    // Spending Calculations
    // ============================================================
    function monthlyHKD(sub) {
      const hkd = toHKD(sub.amount, sub.currency);
      return sub.billingCycle === 'yearly' ? hkd / 12 : hkd;
    }

    function yearlyHKD(sub) {
      const hkd = toHKD(sub.amount, sub.currency);
      return sub.billingCycle === 'monthly' ? hkd * 12 : hkd;
    }

    function calcSummary() {
      const active = state.subscriptions.filter(s => s.status === 'active');
      return {
        monthly:    active.reduce((s, sub) => s + monthlyHKD(sub), 0),
        yearly:     active.reduce((s, sub) => s + yearlyHKD(sub), 0),
        cumulative: calcCumulative(state.subscriptions)
      };
    }

    function calcCumulative(subscriptions) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      return subscriptions
        .filter(sub => sub.status === 'active' || sub.status === 'archived')
        .reduce((total, sub) => {
          // Split on "T" to avoid timezone-shift when parsing date-only strings
          const dateStr = String(sub.startDate).split('T')[0];
          const start   = new Date(dateStr);
          if (isNaN(start.getTime())) return total;

          // Use endDate as upper bound for archived subscriptions if available
          const endDateStr = sub.endDate ? String(sub.endDate).split('T')[0] : null;
          const end = (endDateStr && sub.status === 'archived') ? new Date(endDateStr) : today;

          let months = 0;
          if (sub.billingCycle === 'monthly') {
            months =
              (end.getFullYear() - start.getFullYear()) * 12 +
              (end.getMonth() - start.getMonth());
            // Add current month only if this month's billing day has already passed
            const billingDayThisMonth = new Date(
              end.getFullYear(), end.getMonth(), start.getDate()
            );
            if (end >= billingDayThisMonth) months += 1;
            months = Math.max(months, 1);
          } else if (sub.billingCycle === 'yearly') {
            let years = end.getFullYear() - start.getFullYear();
            const hasPassedAnniversary =
              end.getMonth() > start.getMonth() ||
              (end.getMonth() === start.getMonth() &&
                end.getDate() >= start.getDate());
            if (!hasPassedAnniversary) years -= 1;
            years  = Math.max(years, 0) + 1;
            months = years; // one unit per billing cycle
          }

          return total + toHKD(sub.amount, sub.currency) * months;
        }, 0);
    }

    // ============================================================
    // Date Helpers
    // ============================================================
    function calcNextBillingDate(startDate, billingCycle) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const next = new Date(startDate);
      if (billingCycle === 'monthly') {
        while (next <= today) next.setMonth(next.getMonth() + 1);
      } else {
        while (next <= today) next.setFullYear(next.getFullYear() + 1);
      }
      return next.toISOString().split('T')[0];
    }

    function daysUntil(dateStr) {
      const target = new Date(dateStr);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      target.setHours(0, 0, 0, 0);
      return Math.round((target - today) / 86400000);
    }

    function todayISO() {
      return new Date().toISOString().split('T')[0];
    }

    function toDateInputValue(dateStr) {
      if (!dateStr) return "";
      return String(dateStr).split("T")[0];
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      // Strip time portion first to avoid timezone shift
      const clean = String(dateStr).split('T')[0];
      if (!clean || clean === 'undefined') return '';
      const d = new Date(clean + 'T00:00:00');
      if (isNaN(d)) return clean; // fallback: show raw string if parse fails
      return d.toLocaleDateString('zh-HK', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
      // Output example: 2026年4月16日
    }

    // ============================================================
    // API
    // ============================================================
    let spinnerDepth = 0;

    // All requests use GET to avoid CORS preflight.
    // Write operations encode their payload as ?data=<JSON string>.
    async function apiFetch(action, data = null) {
      spinnerDepth++;
      document.getElementById('apiSpinner').classList.remove('hidden');
      try {
        let url = `${CONFIG.API_URL}?action=${encodeURIComponent(action)}`;
        if (data !== null) {
          url += `&data=${encodeURIComponent(JSON.stringify(data))}`;
        }
        const response = await fetch(url, { redirect: 'follow' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const result = await response.json();
        if (result && result.error) throw new Error(result.error);
        return result;
      } catch (err) {
        showToast('錯誤：' + err.message, 'error');
        throw err;
      } finally {
        spinnerDepth = Math.max(0, spinnerDepth - 1);
        if (spinnerDepth === 0) document.getElementById('apiSpinner').classList.add('hidden');
      }
    }

    async function loadData() {
      if (CONFIG.API_URL === 'https://script.google.com/macros/library/d/19jY9_w1DV4NgHSWRxxMnxLaksAru240q0QM0nGR3ED6nF9o_KbgwYemK/2') {
        showToast('請先在 CONFIG.API_URL 填入 Apps Script 網址', 'error');
        document.getElementById('loadingOverlay').style.display = 'none';
        renderAll();
        return;
      }
      try {
        const [subs, bills] = await Promise.all([
          apiFetch('getSubscriptions'),
          apiFetch('getBills')
        ]);
        state.subscriptions = Array.isArray(subs) ? subs : [];
        state.bills = Array.isArray(bills) ? bills : [];
        renderAll();
      } catch (_) {
        renderAll(); // show empty state on error
      } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
      }
    }

    async function loadAndDisplayRates() {
      // Show loading state
      ['rateUSD', 'rateCNY', 'rateEUR'].forEach(id => {
        document.getElementById(id).textContent = '...';
      });

      try {
        const rates = await apiFetch('getRates');

        // Update CONFIG.RATES for use in convertToHKD()
        if (rates.USDHKD) CONFIG.RATES.USDHKD = rates.USDHKD;
        if (rates.CNYHKD) CONFIG.RATES.CNYHKD = rates.CNYHKD;
        if (rates.EURHKD) CONFIG.RATES.EURHKD = rates.EURHKD;

        // Display on UI
        document.getElementById('rateUSD').textContent =
          rates.USDHKD ? rates.USDHKD.toFixed(4) : 'N/A';
        document.getElementById('rateCNY').textContent =
          rates.CNYHKD ? rates.CNYHKD.toFixed(4) : 'N/A';
        document.getElementById('rateEUR').textContent =
          rates.EURHKD ? rates.EURHKD.toFixed(4) : 'N/A';

        // Timestamp
        const now = new Date();
        document.getElementById('ratesUpdatedAt').textContent =
          now.toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit' });

        // Re-render amounts with updated rates
        renderAll();

        console.log('✅ Live rates loaded:', CONFIG.RATES);
      } catch (e) {
        ['rateUSD', 'rateCNY', 'rateEUR'].forEach(id => {
          document.getElementById(id).textContent = 'N/A';
        });
        document.getElementById('ratesUpdatedAt').textContent = '獲取失敗';
        console.warn('Failed to load rates, using fallback:', CONFIG.RATES);
      }
    }

    async function init() {
      await loadAndDisplayRates();  // fetch rates first
      await loadData();             // then load subscriptions & bills
    }

    // ============================================================
    // Render
    // ============================================================
    function renderAll() {
      renderSummary();
      renderCards();
      renderCharts();
    }

    function renderSummary() {
      const { monthly, yearly, cumulative } = calcSummary();
      document.getElementById('summaryMonthly').textContent    = fmtHKD(monthly);
      document.getElementById('summaryYearly').textContent     = fmtHKD(yearly);
      document.getElementById('summaryCumulative').textContent = fmtHKD(cumulative);
    }

    const CAT_COLORS = {
      '娛樂':   '#6366f1',
      '工作效率': '#22c55e',
      '雲端儲存': '#3b82f6',
      'AI工具':  '#f59e0b',
      '其他':   '#a855f7'
    };

    function catColor(cat) {
      return CAT_COLORS[cat] || '#a855f7';
    }

    function renderCards() {
      const list   = document.getElementById('subscriptionList');
      const empty  = document.getElementById('emptyState');
      let filtered = [...state.subscriptions];
      if (state.filter === 'active')   filtered = filtered.filter(s => s.status === 'active');
      if (state.filter === 'archived') filtered = filtered.filter(s => s.status === 'archived');

      if (filtered.length === 0) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      list.innerHTML = filtered.map(sub => {
        const archived   = sub.status === 'archived';
        const days       = daysUntil(sub.nextBillingDate);
        const urgentBadge = (!archived && days >= 0 && days <= 7)
          ? `<span class="text-xs font-semibold bg-orange-100 text-orange-600 px-2 py-0.5 rounded-full">⚡ ${days}天後扣費</span>`
          : '';
        const cycleLbl   = sub.billingCycle === 'yearly' ? '每年' : '每月';
        const statusCls  = archived
          ? 'bg-gray-100 text-gray-500'
          : 'bg-green-100 text-green-700';
        const statusLbl  = archived ? '封存' : '啟用中';
        const cardOpacity = archived ? 'opacity-60' : '';

        return `
          <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-4 flex flex-col gap-3 hover:shadow-md transition-shadow ${cardOpacity}">
            <div class="flex items-start justify-between gap-2">
              <div class="flex items-center gap-2 min-w-0">
                <span class="text-3xl leading-none">${escHtml(sub.emoji || '📦')}</span>
                <div class="min-w-0">
                  <p class="font-semibold text-gray-800 dark:text-gray-100 truncate text-sm">${escHtml(sub.name)}</p>
                  <span class="inline-block text-xs px-2 py-0.5 rounded-full text-white font-medium mt-0.5"
                    style="background-color:${catColor(sub.category)}">${escHtml(sub.category)}</span>
                </div>
              </div>
              <span class="text-xs font-semibold px-2 py-0.5 rounded-full shrink-0 ${statusCls}">${statusLbl}</span>
            </div>

            <div class="flex items-baseline justify-between">
              <span class="text-base font-bold text-gray-800 dark:text-gray-100 amount-display">${formatAmount(sub.amount, sub.currency)}</span>
              <span class="text-xs text-gray-400 dark:text-gray-500">${cycleLbl}</span>
            </div>

            <div class="flex items-center gap-2 flex-wrap text-xs text-gray-400 dark:text-gray-500">
              <span>下次：${formatDate(sub.nextBillingDate)}</span>
              ${urgentBadge}
            </div>

            ${sub.notes ? `<p class="text-xs text-gray-400 dark:text-gray-500 truncate">${escHtml(String(sub.notes))}</p>` : ''}

            ${archived ? `<p class="text-xs text-gray-400 dark:text-gray-500">結束日期：${sub.endDate ? formatDate(sub.endDate) : '未記錄'}</p>` : ''}

            <div class="flex gap-2 pt-2 border-t border-gray-50 dark:border-gray-700 mt-auto">
              <button
                data-action="edit" data-id="${escHtml(String(sub.id))}"
                class="flex-1 text-xs text-indigo-600 hover:text-indigo-800 font-semibold py-1.5 rounded-lg hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-colors">
                編輯
              </button>
              <button
                data-action="remove" data-id="${escHtml(String(sub.id))}"
                class="flex-1 text-xs text-red-500 hover:text-red-700 font-semibold py-1.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                移除
              </button>
            </div>
          </div>`;
      }).join('');
    }

    // ============================================================
    // Charts
    // ============================================================
    function getChartColors() {
      const isDark = document.documentElement.classList.contains("dark");
      return {
        gridColor:  isDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.05)",
        tickColor:  isDark ? "#9CA3AF" : "#6B7280",
        labelColor: isDark ? "#D1D5DB" : "#374151",
        borderColor: isDark ? "#1F2937" : "#fff"
      };
    }

    function renderCharts() {
      renderPieChart();
      renderTrendChart(state.subscriptions);
    }

    function renderPieChart() {
      const active = state.subscriptions.filter(s => s.status === 'active');
      const byCat  = {};
      active.forEach(s => {
        const k = s.category || '其他';
        byCat[k] = (byCat[k] || 0) + monthlyHKD(s);
      });

      const labels = Object.keys(byCat);
      const data   = labels.map(k => byCat[k]);
      const colors = labels.map(l => catColor(l));
      const pieEmpty = document.getElementById('pieEmpty');

      if (state.pieChart) { state.pieChart.destroy(); state.pieChart = null; }

      if (labels.length === 0) {
        pieEmpty.classList.remove('hidden');
        return;
      }
      pieEmpty.classList.add('hidden');

      const { borderColor, labelColor } = getChartColors();

      state.pieChart = new Chart(
        document.getElementById('pieChart').getContext('2d'),
        {
          type: 'doughnut',
          data: {
            labels,
            datasets: [{
              data,
              backgroundColor: colors,
              borderWidth: 2,
              borderColor
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'bottom',
                labels: { boxWidth: 12, font: { size: 11 }, padding: 12, color: labelColor }
              },
              tooltip: {
                callbacks: {
                  label: ctx => ` ${ctx.label}: ${fmtHKD(ctx.parsed)}/月`
                }
              }
            }
          }
        }
      );
    }

    function calcLast6MonthsSpending(subscriptions) {
      const months = [];

      // Build array of last 6 months (oldest → newest)
      for (let i = 5; i >= 0; i--) {
        const d = new Date();
        d.setDate(1);
        d.setMonth(d.getMonth() - i);
        months.push({
          year:  d.getFullYear(),
          month: d.getMonth(), // 0-indexed
          label: `${d.getMonth() + 1}月`,
          total: 0
        });
      }

      subscriptions.forEach(sub => {
        if (!sub.startDate) return;
        const start      = new Date(String(sub.startDate).split('T')[0]);
        const end        = sub.endDate
          ? new Date(String(sub.endDate).split('T')[0])
          : new Date();
        const amountHKD  = toHKD(parseFloat(sub.amount) || 0, sub.currency);

        months.forEach(m => {
          const monthStart = new Date(m.year, m.month, 1);
          const monthEnd   = new Date(m.year, m.month + 1, 0); // last day of month

          // Skip if subscription hadn't started or already ended before this month
          if (start > monthEnd || end < monthStart) return;

          if (sub.billingCycle === 'monthly') {
            // Check if billing day falls within this month
            const billingDay = new Date(m.year, m.month, start.getDate());
            if (billingDay >= monthStart && billingDay <= monthEnd &&
                billingDay >= start && billingDay <= end) {
              m.total += amountHKD;
            }
          } else if (sub.billingCycle === 'yearly') {
            // Check if annual billing day falls within this month
            const billingDay = new Date(m.year, start.getMonth(), start.getDate());
            if (billingDay.getMonth() === m.month &&
                billingDay.getFullYear() === m.year &&
                billingDay >= start && billingDay <= end) {
              m.total += amountHKD;
            }
          }
        });
      });

      return months;
    }

    function renderTrendChart(subscriptions) {
      const monthlyData = calcLast6MonthsSpending(subscriptions);

      const ctx = document.getElementById('trendChart').getContext('2d');

      // Destroy existing chart instance if exists
      if (window.trendChartInstance) window.trendChartInstance.destroy();

      const { gridColor, tickColor, labelColor } = getChartColors();

      window.trendChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: monthlyData.map(m => m.label),
          datasets: [{
            label: '月支出 (HKD)',
            data: monthlyData.map(m => parseFloat(m.total.toFixed(2))),
            borderColor: '#4F46E5',
            backgroundColor: 'rgba(79, 70, 229, 0.08)',
            borderWidth: 2.5,
            pointBackgroundColor: '#4F46E5',
            pointRadius: 5,
            pointHoverRadius: 7,
            fill: true,
            tension: 0.4  // smooth curve
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => `HK$${ctx.parsed.y.toFixed(2)}`
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                callback: val => `HK$${val}`,
                color: tickColor
              },
              grid: { color: gridColor }
            },
            x: {
              grid: { display: false },
              ticks: { color: tickColor }
            }
          }
        }
      });
    }

    // ============================================================
    // Add / Edit Modal
    // ============================================================
    function openAddModal() {
      state.editingId = null;
      document.getElementById('modalTitle').textContent = '新增訂閱';
      document.getElementById('subscriptionForm').reset();
      document.getElementById('fieldEmoji').value    = '📦';
      document.getElementById('fieldStartDate').value = todayISO();
      document.getElementById('fieldCurrency').value  = CONFIG.DEFAULT_CURRENCY;
      document.getElementById('fieldEndDateWrapper').style.display = 'none';
      document.getElementById('fieldEndDate').value = '';
      showModal('modalOverlay');
    }

    function openEditModal(id) {
      const sub = state.subscriptions.find(s => String(s.id) === String(id));
      if (!sub) return;
      state.editingId = sub.id;
      document.getElementById('modalTitle').textContent       = '編輯訂閱';
      document.getElementById('fieldId').value                = sub.id;
      document.getElementById('fieldName').value              = sub.name;
      document.getElementById('fieldCategory').value          = sub.category;
      document.getElementById('fieldEmoji').value             = sub.emoji || '📦';
      document.getElementById('fieldAmount').value            = sub.amount;
      document.getElementById('fieldCurrency').value          = sub.currency;
      document.getElementById('fieldBillingCycle').value      = sub.billingCycle;
      document.getElementById('fieldStartDate').value         = toDateInputValue(sub.startDate);
      document.getElementById('fieldNotes').value             = sub.notes || '';
      // Show end date field only for archived subscriptions
      const endDateWrapper = document.getElementById('fieldEndDateWrapper');
      if (sub.status === 'archived') {
        endDateWrapper.style.display = 'block';
        document.getElementById('fieldEndDate').value = toDateInputValue(sub.endDate);
      } else {
        endDateWrapper.style.display = 'none';
        document.getElementById('fieldEndDate').value = '';
      }
      showModal('modalOverlay');
    }

    function closeModal() {
      hideModal('modalOverlay');
    }

    async function saveSubscription(e) {
      e.preventDefault();

      const name      = document.getElementById('fieldName').value.trim();
      const amount    = parseFloat(document.getElementById('fieldAmount').value);
      const startDate = document.getElementById('fieldStartDate').value;

      if (!name) { showToast('請填寫訂閱名稱', 'error'); return; }
      if (!startDate) { showToast('請選擇開始日期', 'error'); return; }
      if (isNaN(amount) || amount <= 0) { showToast('請輸入有效金額', 'error'); return; }

      const billingCycle     = document.getElementById('fieldBillingCycle').value;
      const nextBillingDate  = calcNextBillingDate(startDate, billingCycle);

      const data = {
        name,
        category:        document.getElementById('fieldCategory').value,
        emoji:           document.getElementById('fieldEmoji').value.trim() || '📦',
        billingCycle,
        amount,
        currency:        document.getElementById('fieldCurrency').value,
        startDate,
        nextBillingDate,
        notes:           document.getElementById('fieldNotes').value.trim()
      };

      // Include endDate when editing an archived subscription
      const endDateWrapper = document.getElementById('fieldEndDateWrapper');
      if (endDateWrapper && endDateWrapper.style.display !== 'none') {
        data.endDate = document.getElementById('fieldEndDate').value || '';
      }

      try {
        if (state.editingId) {
          data.id = state.editingId;
          await apiFetch('updateSubscription', data);
          const idx = state.subscriptions.findIndex(s => String(s.id) === String(state.editingId));
          if (idx !== -1) state.subscriptions[idx] = { ...state.subscriptions[idx], ...data };
          showToast('訂閱已更新', 'success');
        } else {
          data.id     = crypto.randomUUID();
          data.status = 'active';
          await apiFetch('addSubscription', data);
          // Record the initial bill
          const bill = {
            id:             crypto.randomUUID(),
            subscriptionId: data.id,
            date:           startDate,
            amount:         data.amount,
            currency:       data.currency
          };
          await apiFetch('addBill', bill);
          state.subscriptions.push(data);
          state.bills.push(bill);
          showToast('訂閱已新增', 'success');
        }
        closeModal();
        renderAll();
      } catch (_) { /* error shown by apiFetch */ }
    }

    // ============================================================
    // Remove Modal
    // ============================================================
    function openRemoveModal(id) {
      const sub = state.subscriptions.find(s => String(s.id) === String(id));
      if (!sub) return;
      state.removingId = sub.id;
      document.getElementById('removeModalName').textContent = `「${sub.name}」`;
      // Reset to default (archive)
      document.querySelectorAll('input[name="removeMode"]').forEach(r => {
        r.checked = r.value === 'archive';
      });
      document.getElementById('removeEndDate').value = todayISO();
      syncRemoveLabels();
      showModal('removeModalOverlay');
    }

    async function confirmRemove() {
      const mode       = document.querySelector('input[name="removeMode"]:checked').value;
      const deleteBills = mode === 'delete';

      try {
        if (deleteBills) {
          await apiFetch('deleteSubscription', { id: state.removingId, deleteBills: true });
          state.bills         = state.bills.filter(b => String(b.subscriptionId) !== String(state.removingId));
          state.subscriptions = state.subscriptions.filter(s => String(s.id) !== String(state.removingId));
          showToast('訂閱及帳單已刪除', 'success');
        } else {
          const endDate = document.getElementById('removeEndDate').value || todayISO();
          await apiFetch('updateSubscription', { id: state.removingId, status: 'archived', endDate });
          const idx = state.subscriptions.findIndex(s => String(s.id) === String(state.removingId));
          if (idx !== -1) {
            state.subscriptions[idx].status  = 'archived';
            state.subscriptions[idx].endDate = endDate;
          }
          showToast('訂閱已封存', 'success');
        }
        hideModal('removeModalOverlay');
        renderAll();
      } catch (_) { /* error shown by apiFetch */ }
    }

    // ============================================================
    // Modal Helpers
    // ============================================================
    function showModal(id) {
      const overlay = document.getElementById(id);
      overlay.classList.remove('hidden');
      overlay.classList.add('flex', 'modal-enter');
    }

    function hideModal(id) {
      const overlay = document.getElementById(id);
      overlay.classList.add('hidden');
      overlay.classList.remove('flex', 'modal-enter');
    }

    // ============================================================
    // Toast Notifications
    // ============================================================
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast     = document.createElement('div');
      const bg        = type === 'error' ? 'bg-red-500' : 'bg-green-500';
      toast.className = `${bg} text-white text-sm font-medium px-4 py-3 rounded-xl shadow-lg pointer-events-auto`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    // ============================================================
    // Filter Tabs
    // ============================================================
    function setFilter(filter) {
      state.filter = filter;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        const active = btn.dataset.filter === filter;
        btn.className = active
          ? 'tab-btn px-4 py-2 text-sm font-semibold rounded-lg transition-colors bg-indigo-600 text-white shadow-sm'
          : 'tab-btn px-4 py-2 text-sm font-medium rounded-lg transition-colors text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700';
      });
      renderCards();
    }

    // ============================================================
    // Remove radio visual sync
    // ============================================================
    function syncRemoveLabels() {
      const selected = document.querySelector('input[name="removeMode"]:checked')?.value;
      document.getElementById('labelDelete').className  = selected === 'delete'
        ? 'flex items-start gap-3 cursor-pointer p-3 rounded-xl border border-indigo-200 dark:border-indigo-500 bg-indigo-50 dark:bg-indigo-900/30 transition-colors'
        : 'flex items-start gap-3 cursor-pointer p-3 rounded-xl border border-transparent hover:border-gray-200 dark:hover:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors';
      document.getElementById('labelArchive').className = selected === 'archive'
        ? 'flex items-start gap-3 cursor-pointer p-3 rounded-xl border border-indigo-200 dark:border-indigo-500 bg-indigo-50 dark:bg-indigo-900/30 transition-colors'
        : 'flex items-start gap-3 cursor-pointer p-3 rounded-xl border border-transparent hover:border-gray-200 dark:hover:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors';
      document.getElementById('endDateField').style.display = selected === 'archive' ? 'block' : 'none';
    }

    // ============================================================
    // HTML Escape (XSS prevention)
    // ============================================================
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ============================================================
    // Event Listeners
    // ============================================================
    document.getElementById('subscriptionList').addEventListener('click', (e) => {
      const editBtn   = e.target.closest("[data-action='edit']");
      const removeBtn = e.target.closest("[data-action='remove']");
      if (editBtn)   openEditModal(editBtn.dataset.id);
      if (removeBtn) openRemoveModal(removeBtn.dataset.id);
    });

    document.getElementById('btnAdd').addEventListener('click', openAddModal);
    document.getElementById('btnCloseModal').addEventListener('click', closeModal);
    document.getElementById('btnCancelModal').addEventListener('click', closeModal);
    document.getElementById('subscriptionForm').addEventListener('submit', saveSubscription);
    document.getElementById('btnCancelRemove').addEventListener('click', () => hideModal('removeModalOverlay'));
    document.getElementById('btnConfirmRemove').addEventListener('click', confirmRemove);

    document.querySelectorAll('.tab-btn').forEach(btn =>
      btn.addEventListener('click', () => setFilter(btn.dataset.filter))
    );

    document.querySelectorAll('input[name="removeMode"]').forEach(r =>
      r.addEventListener('change', syncRemoveLabels)
    );

    // Close modals on backdrop click
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });
    document.getElementById('removeModalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('removeModalOverlay')) hideModal('removeModalOverlay');
    });

    // ============================================================
    // Initialize
    // ============================================================

    // ── Dark Mode ──────────────────────────────────────────────
    const darkToggleBtn = document.getElementById("darkModeToggle");
    const darkModeIcon  = document.getElementById("darkModeIcon");

    function applyDarkMode(isDark) {
      document.documentElement.classList.toggle("dark", isDark);
      darkModeIcon.textContent = isDark ? "☀️" : "🌙";
      localStorage.setItem("sublens-darkmode", isDark ? "1" : "0");
    }

    // Restore preference on load
    const savedDark   = localStorage.getItem("sublens-darkmode");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    applyDarkMode(savedDark !== null ? savedDark === "1" : prefersDark);

    darkToggleBtn.addEventListener("click", () => {
      const isDark = document.documentElement.classList.contains("dark");
      applyDarkMode(!isDark);
      renderTrendChart(state.subscriptions);
      renderPieChart();
    });

    setFilter('all');
    init();

  </script>

  <!--
  ============================================================
  SETUP GUIDE
  ============================================================

  1. 建立 Google 試算表
     - 新增工作表 "subscriptions"，第一列填入標題：
       id | name | category | emoji | billingCycle | amount | currency | startDate | nextBillingDate | status | notes
     - 新增工作表 "bills"，第一列填入標題：
       id | subscriptionId | date | amount | currency

  2. 部署 Apps Script
     - 在試算表中前往「擴充功能」→「Apps Script」
     - 貼上 appsscript.gs 的內容並儲存
     - 點選「部署」→「新增部署項目」→ 類型選「網頁應用程式」
     - 設定：以我的身分執行 / 誰可以存取：任何人
     - 點選「部署」，授權後複製 Web App URL

  3. 填入 API URL
     - 將複製的 URL 貼到此檔案中 CONFIG.API_URL 的位置
     - 將 "YOUR_APPS_SCRIPT_WEB_APP_URL_HERE" 替換掉即可
